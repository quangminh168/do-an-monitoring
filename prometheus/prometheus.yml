global:
  scrape_interval: 5s
rule_files:
  - "rules/*.yml"
scrape_configs:
  - job_name: "node_exporter"
    static_configs:
      - targets:
          - "192.168.29.101:9100"
          - "192.168.29.102:9100"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'

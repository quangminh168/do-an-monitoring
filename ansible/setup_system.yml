---
- name: Install Node Exporter on all nodes
  hosts: nodes
  become: yes

  vars:
    node_exporter_version: "1.7.0"
    node_exporter_user: "node_exporter"

  tasks:
  - name: Kill existing process on port 9100
    shell: "fuser -k 9100/tcp || true"
    ignore_errors: yes

  - name: Remove old node_exporter archive if exists
    file:
      path: /tmp/node_exporter.tar.gz
      state: absent

  - name: Stop old node_exporter service
    systemd:
      name: node_exporter
      state: stopped
      enabled: no
    ignore_errors: yes

  - name: Create node_exporter user
    user:
      name: "{{ node_exporter_user }}"
      shell: /usr/sbin/nologin
      create_home: no

  - name: Download node exporter
    get_url:
      url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
      dest: /tmp/node_exporter.tar.gz
      mode: '0644'

  - name: Check downloaded file type (debug)
    command: file /tmp/node_exporter.tar.gz
    register: file_check

  - debug:
      var: file_check.stdout

  - name: Extract node exporter
    unarchive:
      src: /tmp/node_exporter.tar.gz
      dest: /tmp/
      remote_src: yes

  - name: Copy node_exporter binary
    copy:
      src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
      dest: /usr/local/bin/node_exporter
      mode: '0755'
      remote_src: yes

  - name: Create systemd service
    copy:
      dest: /etc/systemd/system/node_exporter.service
      content: |
        [Unit]
        Description=Node Exporter
        After=network.target

        [Service]
        User={{ node_exporter_user }}
        ExecStart=/usr/local/bin/node_exporter

        [Install]
        WantedBy=default.target

  - name: Reload systemd
    command: systemctl daemon-reexec


  - name: Enable and start node_exporter
    systemd:
      name: node_exporter
      enabled: yes
      state: started

  - debug:
      var: service_status.stdout_lines

- name: Install Promtail on all nodes
  hosts: nodes
  become: yes

  vars:
    promtail_version: "2.9.0"

  tasks:
    - name: Create Promtail config directory
      file:
        path: /etc/promtail
        state: directory
        mode: '0755'

    - name: Download Promtail binary
      get_url:
        url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
        dest: /tmp/promtail.zip
        mode: '0644'

    - name: Install unzip
      apt:
        name: unzip
        state: present

    - name: Extract Promtail binary
      unarchive:
        src: /tmp/promtail.zip
        dest: /usr/local/bin/
        remote_src: yes

    - name: Copy Promtail configuration
      template:
        src: templates/promtail-config.yml.j2
        dest: /etc/promtail/config.yml

    - name: Create Promtail systemd service
      copy:
        dest: /etc/systemd/system/promtail.service
        content: |
          [Unit]
          Description=Promtail service
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/promtail-linux-amd64 -config.file=/etc/promtail/config.yml
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable Promtail
      systemd:
        name: promtail
        state: started
        enabled: yes
        daemon_reload: yes
